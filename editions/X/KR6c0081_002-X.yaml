body:
  text: 二詳住降前發心無法顯般若波羅蜜凡經中無實無虗一切諸法無非佛法是法平等無有高下以三十二相見如來如如不動等皆明彼岸實際之體乃般若歸宿究竟地也此中雖亦有無法無相一切即非之言然其正意皆點平等無二之彼岸不可以辭礙意為二一問爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心生佛本元平等實際所謂究竟泥洹常寂滅相終歸于空圓滿菩提亦歸無所得則是纖塵不立澄清湛寂者是其本體也今空生前窺希有特發此心欲證其元先問降住如來曲為開示已知住降離相既知脩行離相却顧本因則從發心而來若有一能發之法所發之心則是對待宛然人我叢立正是因名立所所既妄立生汝妄能能所叢立四相紛紜源頭既濁流派難清至度生時如何能降人我塵勞耶況平等法界澄靜無波若有一發則似于靜生動動即有苦果不離因三細六粗糾纏紛動如本形既曲迹影自凹如何能安住實理耶向下如來直示中菩薩度生了無四相是答其降伏也實無有法發菩提心是答其應住也須知空生此問似與前同而其義意深入堂奧直欲究明最初能發一點根元所謂希更審除微細惑也若此根不清則枯樁舊處仍為繫驢生相無明還為種子是大有所有焉會無相彼岸乎正前箭猶輕後箭深直向脚下𢯱根也故如來答示亦直明發心無法截斷最初能發生相根元然後歷八十一科以顯彼岸平等乃此經中甚深妙談言語似同而旨歸迥別若只作重說再為鈍根而判則佛意經旨恐永沉矣二答中二初示發心平等故稱性本無二一稱性故無所度生佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切眾生滅度一切眾生已而無有一眾生實滅度者何以故須菩提若菩薩有我相人相眾生相壽者相即非菩薩此直答其云何降伏其心之問菩薩發心上求佛道必先下度眾生度生時必先了知生佛齊平一如無二故度盡一切而實無眾生得滅度者一切眾生俱涅槃相不可復滅一切眾生俱菩提相不可復得佛乃已證之眾生生乃在迷之諸佛此真如界內絕生佛之假名平等慧中無自他之形相菩薩雖知平等實際不受一塵而不妨佛事門頭不捨一法晏坐水月道場建立空華佛事諸佛時時度心內眾生眾生時時成自性諸佛故終日度自性如幻之眾生而終日無能度所度之相可得不過點示眾生本有令之復還元覺而已如醫目者但去其翳非別與光明也故曰實無眾生得滅度者此稱性而示無所度生也何以故三字乃徵出無所度生之義問菩薩發心度生乃成佛根本非分外事也既度盡矣何必曰實無得度耶故即釋曰平等真法界佛不度眾生若有一所度之生即是汝問能所宛然四相叢立根源不清即度生時不能降伏其心矣既有四相全是凡夫豈得謂之圓解生佛齊平之菩薩哉須知熾然度生時尚稱眾生性體實無所度之生況菩薩稱性發心時塵淨光生又豈有所發之心哉二示平等故無能發法所以者何須菩提實無有法發阿耨多羅三藐三菩提心者此答其云何應住之問渠問若有發心之法未免寂體起動麤細相生波翻浪鼓何能安住實際理地耶故答菩薩圓解初開不唯顯佛九亦同彰從此全性起脩俱體俱用如全水為波發一切功德智慧境界不縱不橫發得本有強名為發實無能發所發只是離去妄塵復完本有但盡凡情別無聖解正忽悟本頭非從外得也豈實有能發之法哉此實無有法之無字不但無其有抑且無其無無凡無聖無染無淨無高下虗實葢當人心體元無法相稱此顯發發得平等即是無發而發發而無發由是無住而住住而無住以無住法住般若波羅蜜中何疑有發心時即不能安住哉此一句直截痛快掃盡生相疑根托出眾生平等法界乃下半卷經中大主腦大關節答前疑申後義凡歷八十一科破相以顯無相般若只完得此無字也復會一切皆摩訶衍以歸平等彼岸亦此無字也若云對有言無則得偏失圓矣所以者何四字是徵問云何度生有相即非菩薩耶故即答云菩薩最初發心時尚無有法其源自清豈可度生時反存所度之相哉二歷諸法釋無顯平等衍門二一正歷諸法釋無顯等二複疎所歷釋無顯等般若大旨在以空慧水淘汰執情會一切法皆摩訶衍以空破執上半卷已明自此至終皆歷一切法釋無而方當釋無之時處處點歸平等彼岸正會一切皆入衍門也言會入者大般若中如舉空則色空受空乃至識空六入空十二處空十八界空四諦因緣六度乃至一切種智空歷八十一科章章皆爾空則俱空無我則俱無我乃至實則俱實秪如心經照見五蘊皆空故無蘊無入無界無諦緣智德以無所得故得菩提涅槃皆歷聖凡迷悟因果等法而歸于一是為會一切法皆摩訶衍也今經會法歸衍與大小般若宛爾孱齊葢八十一科之法雖多界內陰界入處只一三業也界外大小漸頓只一因果也複疎云者正大部中一一皆歷諸法以入衍門意也故今只歷因果三業以釋無法而旨歸平等實相的是會法歸衍部旨也當知釋無之處正般若空慧無實無虗即實相彼岸至歷法中所說雖有多少缺具不同而莫不一一呈露平等波羅蜜也但前後問答中互有傍正前半卷雖有無實無虗等語而正意重在金剛慧用下半卷雖有即非無相之語而正意重在是法平等不可因前後互出之言以礙此經大旨也今初為二一歷二法二一歷果釋顯二一正明二意為二一釋實無所得須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛即不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼發心究竟二不別故舉如來於然燈佛時實無所得以顯菩薩于初因時實無所發下之實無有法得菩提謹對上實無有法發菩提句葢此二無字俱指平等性體增不得絲毫減不得絲毫若最初有法發心則是因增謗非平等矣若後有法得果即是果增謗非平等今果既平等無增顯出因亦平等無增如大圓鏡光第去浮塵光體自現不可以強加顏色為得光明也但恐圓義難彰乃假問答播弄而斷定之如我解佛所說義無有法得菩提在空生意謂論如來今日成佛由得菩提而來似不可無但我解佛無法發心之語以推之則又似乎無法得菩提矣此空生解義言無未敢決定以為無所得佛即決定其旨曰汝不可首鼠狐疑語仍兩可須知十方如來究竟果成不過復還本有于平等體上實無所增所謂圓滿菩提歸無所得也此句乃千金不易決定之詞仍恐其義不顯復加反顯以明無更以順說以明無若有法如來得菩提是反說以實無有法得是順說如此而實無有法之旨盡矣二明所得平等何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來說一切法皆是佛法以上反正研詳以明初後無得意歸平等而語似真空故復提能得所得人法二件以顯平等衍門何以故三字是徵詞問一切眾生不得菩提故不得成如來今佛因得了菩提故得成如來若據佛比說實無有法得菩提則與眾生同矣何得稱如來哉若稱如來應有所得故即釋曰如來者豈真有所得而稱如來乎不過妄去本彰復還平等如體而已諸法乃十界十如等法一一皆住真如本位凡夫迷之枉受生死名眾生諸佛悟之無非自性稱如來如義者如名不異顯十界齊平也如名不異完千如全體也如名不異點諸佛證同也經云眾生如彌勒如一如無二如又云周行十方界還是瓶處如世尊證如混虗空為體性東西南北瓶內空十方空一體無異復完平等本覺總是法王之身是為諸法如義既完本有不可贅疣名字但異于眾生之迷而不得完乎平等如如以來歸正覺者強名之曰如來而已矣此能證之如來尚只反本別無他得豈所得之菩提實有法哉故曰若有人言如來得菩提者非也須菩提實無有法佛得菩提須知如來所得菩提亦只完本有平等如大明鏡纖埃不立若加一有法即增謗之實也加一無法即減謗之虗也此乃圓滿菩提無欠無餘無實無虗本元心地也以由無實故實無所得以由無虗故十方諸佛熾成如來也是故如來說一切法皆是佛法者此是結顯平等之語是故二字乃結攝前義既能證如來只完得本有諸法如義所證菩提亦只完本有無實無虗則未悟之先已證之後同此一體所謂是法住法位世間相常住未悟之時何曾有絲毫減異故一切法皆是法身全體何必證菩提成如來而後名為佛法哉斯即歷如來得果之法而廣會一切法皆摩訶衍顯平等彼岸也向下歷法釋無中或文有缺具皆然二結顯二意二一正結須菩提所言一切法者即非一切法是故名一切法即非結上釋實無所得是名結上明所得平等二喻顯須菩提譬如人身長大須菩提言世尊如來說人身長大即為非大身是名大身非大身喻顯即非佛法是名大身喻顯是名佛法凡下所明如此等句皆點空慧般若平等彼岸二意然以人身之淺事以顯佛法之深微宛有二意至下約施福貼顯中當明二歷因釋顯二一離相度生因須菩提菩薩亦如是若作是言我當滅度無量眾生即不名菩薩何以故須菩提實無有法名為菩薩是故佛說一切法無我無人無眾生無壽者實無有法名為菩薩與實無有法發心實無有得果血脈照映如驪珠不失二無住莊嚴因須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來說莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來說名真是菩薩經初無住行施但舉六度莊嚴中最初布施一度其實意該六度今言莊嚴佛土者乃舉六度之全缺具不同義則一也二歷三法釋顯三一歷意業二一約境智釋顯二一出能照智須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼五眼即如來般若圓照遍了法界十方不隔恒沙心非恒沙心同一般若無相也三際不遷三世心無三世相同一實相常住也問所照之心屬意業則可了知能照之智是五眼如何會通答如來五眼即四智本是圓通不必致疑即眾生眼見莫不由心葢心識在眼即眼識眼若無心則何能見如木人已死二俱無見楞嚴云如是見性是心非眼書云心不在焉視而不見二融所照境二一約實無所得蕩相須菩提於意云何如恒河中所有沙佛說是沙不如是世尊如來說是沙須菩提於意云何如一恒河中所有沙有如是沙等恒河是諸恒河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有眾生若干種心如來悉知何以故如來說諸心皆為非心是名為心恒河諸心則塵勞種種迷暗般若圓明今以空慧蕩之即為非心則復還離相之實無所得也二約平等常住釋明所以者何須菩提過去心不可得現在心不在得未來心不可得三際遷流則生死無常背于常住彼岸今亦以圓智融之十世古今不離當念則復完平等實相矣夫如來以般若妙慧會一切聖凡因果等法而歸摩訶衍乃事從聖起先直點圓人發心稱性本無體自平等由是順勢以無得果度生嚴土而出世聖人初中後因果等心悉歸衍門空慧矣聖法既融勢如建瓴以融界內在纏凡法恒沙之心叵得則金剛般若顯三際之心了無則常住彼岸彰皆為非心稱性本無也是名為心衍門平等也融八十一科之法至矣盡矣此般若部旨極廣大精微之最章明較著處推此以例前後文或出沒理實盡焉故歷三際中庋身口而先歷意業從便從要佛意甚深二約施福貼顯須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多引福德無故以貼顯皆為非心引得福德多貼顯是名為心凡當說法至深微處反引世間淺事貼顯使深義明了者一是如來以種種因緣事相開示眾生使之解悟之大慈也二是如來說法巧妙令異人機解活潑如珠走盤之師子擲兒法也如上一切法即非一切法何等深妙而忽換轉話頭以曉機情曰譬如人身長大等皆是族矣又復舉極好布施之心猶不可著有若一著有福即非無住般若何況損人利己五逆十惡之恒沙三際心哉二歷身業釋顯須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來說具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足歷身業中只舉如來身業者以如來具足身相猶屬有為非般若一塵不染之本體抑況三乘尚帶無明之身相乎又況六凡具足五住之身相乎當知一落身相皆為四相染汙般若體矣故云不可以身相見也佛身既非一切俱非俱非之後法法全體相相實相則不但佛身是名身相即九界身相亦皆實相波羅蜜矣故舉一佛身空則佛身尚空何況九界不空會則佛身尚會何況九界不會三歷口業釋顯二一無所說法須菩提汝勿謂如來作是念我當有所說法莫作是念何以故若人言如來有所說法即為謗佛不能解我所說故須菩提說法者無法可說是名說法此具能說如來能聞眾生聖凡均具佛說屬口生聽屬耳六根可得互舉也若言如來有所說法即為謗佛者佛之所說乃對病之藥初無定在不過去眾生之病著耳眾生病去其藥則除若謂如來定有空有之法則是謗佛有定法矣此約對機非實有也二者即所說之法乃言下所詮之理理不屬言言不及理所謂寄言談于象外而其理絕精麤諸法寂滅相不可以言宣正如標月指指非是月月非是指認指為月不解所指認言為理不解所說矣此約契理之說非實有也須知如來為眾生故不得已示眾生見理之說下情迷之尚以藥為毒執言生障況九界言說乎又如來口說於離言說相之般若體上猶為多事況眾生口四業乎二無能聞生爾時慧命須菩提白佛言世尊頗有眾生於未來世聞說是法生信心不佛言須菩提彼非眾生非不眾生何以故須菩提眾生眾生者如來說非眾生是名眾生眾生眾生者非重言也乃牒前所指兩種眾生而言葢能信般若者或五品深信或六根十信此等眾生已是觀行相似即佛故曰彼非眾生然而此身猶是五陰和合而生故曰非不眾生此非眾生之眾生非不眾生之眾生二皆有相俱非般若正體悉宜掃除以入空慧故曰即非眾生此句雙掃前觀行相似即佛及五陰假合之二種眾生入真空妙慧也既空之後則法法皆真一一實相名體不轉均入衍門故曰是名眾生二複疎所歷釋無顯等二複者重也疎者通也如前已歷因果三業等八十一科之法釋無以歸平等摩訶衍矣今重提前所歷之法廣略互出疎通決擇以入衍門葢佛說大品般若歷八十一科入摩訶衍則法法始從色心終一切種智今約單複釋無顯等以歸衍門義實同之但前半卷約住降離相明般若則以廣略二門釋之今之單複或前略者後廣或前廣者後略彼此互顯等義彌明一複疎二法二一疎歷果釋顯二一複疎二意二結顯二意初中二一疎實無所得須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提前佛明於然燈佛所實無有法得阿耨菩提反復釋明今云乃至無有少法可得是名菩提四相為有法相為法非法相為少法也此疎通前實無所得之文甚明二疎所得平等二一直示性體復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提前云諸法如義無實無虗一切法皆是佛法今直點之曰是法平等二稱性脩證以無我無人無眾生無壽者脩一切善法即得阿耨多羅三藐三菩提所謂染汙即不得脩證即不無無四相而脩善法乃名無所住而生其心從性善起脩善脩善即性善性善即顯阿耨菩提也二結顯二意中二一約善法結明須菩提所言善法者即非善法是名善法即非善法結上實無所得是名善法結上所得平等前之佛法者即非佛法是名佛法乃約性說今之善法乃約脩說二引施福貼顯須菩提若人滿三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及七寶布施乃是相福不及離相般若此反顯上實無所得受持般若波羅蜜法乃平等性功故其德不貲此貼顯上所得平等須知初歷果中但約性說故結中亦約性而顯中乃約喻今複疎中約修說故結中亦約脩而顯中乃約施脩不離性性不妨脩脩性各出互顯彌明二複疎歷因釋顯二一標須菩提於意云何汝等勿謂如來作是念我當度眾生眾生著四相而輪迴雖因依正二境然不怨於飄瓦虗舟多分於有情愛憎境上起即如來以慈悲度生若一作念即四相叢立同于下凡矣況六道乎前歷因中約菩薩度生今約如來度生者在因名菩薩因極即如來舉果則益顯離相之因功不唐捐二釋二一釋度生須菩提莫作是念何以故實無有眾生如來度者若有眾生如來度者如來即有我人眾生壽者平等真法界佛不度眾生故云實無有度者然菩薩如來熾然度生不過如夢勤如空名惑絕幻因既滿鏡像果圓而已豈真有所度之眾生哉若有下即反顯之詞如來既無四相則亦無所度眾生矣二釋我當須菩提如來說有我者即非有我而凡夫之人以為有我須菩提凡夫者如來說即非凡夫是名凡夫上云我當度眾生度生之義前已釋明今復除人疑曰即如來比說我當度生之我字不過假名說我于平等慧中實無自他之形相故曰即非有我其如凡夫之人處處膠著見如來假名說我即執之以為實有我相也況平等體上初無諸佛凡夫之相又不可因如來頃說凡夫二字即執之以為實有凡夫之相可得也須知無有高下凡聖齊平者方是真空般若故曰凡夫者如來說即非凡夫既會真空即顯實相故曰是名凡夫上曰即非莊嚴即非眾生今疎通中云即非有我即非凡夫一義也二複疎三業中三一超疎歷身釋顯二一直顯中道平等須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來前正歷身業意雖含于顯等而語且偏在真空今愈入愈深理宜直顯中實故復舉前事問云可以三十二相見如來不空生至此已領大乘財物深知諸法實相相相法身故即應云以三十二相觀如來葢毗盧遮那遍一切處一切諸法皆是佛法夫百界千如森羅諸法皆即實相如四念處惟色惟聲等義何況三十二相而非平等法身耶此與法華中龍女讚佛微妙淨法身具相三十二以八十種好用莊嚴法身同也須知此處既是重提前邊所歷身業而疎通決擇使平等顯了固當直顯中道實相不可仍前約真空蕩相說也二雙遮二邊相著二一遮著有二遮斷無須知直顯中道實相即是法平等無有高下也若著有無即非平等即非中道況實相者無相無不相若著有無即是相不相矣實相何能彰乎故文雖雙遮意顯中實今初佛言須菩提若以三十二相觀如來者轉輪聖王即是如來須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來爾時世尊而說偈曰若以色見我以音聲求我是人行邪道不能見如來諸法實相唯佛究盡而空生今日分見一班故可與家裏人說家裏事然此事深妙但可你知我知儻凡心不解隨語生著即起有見便謂生死輪王之相即是平等法身矣斯則豈但圓實永沉抑且真俗混亂如之何其可也須菩提答言若論我與世尊已了真空實相者無可無不可今言三十二相即如來此指諸法實相也前言不可以三十二相見如來指此真空離相所謂已過關者掉臂而行左右具宜初無執礙但我今解如來所問之義惟恐眾生不解以詞害意執有生見則真空不彰矣故今當破去著有之心即曰不應以三十二相觀如來也二遮斷無須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不說斷滅相前言勿以具相觀如來者不過破其著有之心以顯中實平等耳其如眾生處處著纔見破有即便執無妄謂如來證菩提者必無具相若具相者即非證菩提之如來此則方出于有即墮于空于平等法上又為下矣故復遮其斷無之執曰當知實相無相無不相若汝執如來平等法身必無具相者此即墮于斷滅外道矣故曰勿謂如來不以具足相故得阿耨菩提也復以發菩提心不說斷滅相以轉釋者良由初發如來菩提之心故得後證如來菩提之果發心究竟二不別若發心時有斷滅則證果時亦斷滅既發心時不斷滅則果成時豈可以斷滅相而目之曰不以具足相得無上菩提哉有無高下之見既遣則中實平等衍門自彰矣如來身相既會衍門實相其九界森羅諸法不言可知矣此如來圓顯平等彼岸之最深切著明處勿割碎強配失經脈絡也發菩提心於法不說斷滅相者圓人名字開解尚爾九亦同彰況發心乎發心者發一切功德智慧境界不前不後因該果海果澈因源萬德性具詎云斷滅夫說斷滅者乃二乘灰滅外道斷無也二追疎意業中約施貼顯須菩提若菩薩以滿恒河沙等世界七寶持用布施若復有人知一切法無我得成于忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德前正歷意業釋顯中以如來離相眼智淨盡恒沙三際妄心今云知一切無我不貪著福德莫非離相般若現前而恒沙心息三際俱忘矣隨其無我不著工夫淺深以判成忍五種高下不同不必執定生法二忍名相以礙圓經應知前正歷意中能所廣明故今複疎但須略點正彼此互顯令平等義彰法應爾耳三疎歷口釋顯中二一正歷三法二例通一切初中三一所說果人平等二所說器界平等三所說諸見平等前正歷口業中但云不能解我所說不知所說何等法是眾生不解處故今略舉三法廣例一切則世出世間若聖若凡若依若正若染若淨若色若心等八十一科及例三千百界八萬四千塵勞生滅俱入真空實相之摩訶衍矣今初所說果人平等須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來欲會所說諸法入波羅蜜衍門先舉出世如來果號既是諸法如義同一實相則何有生滅去來人見來去此無去來所說平等義彰矣二所說器界平等須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵眾寧為多不須菩提言甚多世尊何以故若是微塵眾實有者佛即不說是微塵眾所以者何佛說微塵眾即非微塵眾是名微塵眾世尊如來所說三千大千世界即非世界是名世界何以故若世界實有者即是一合相如來說一合相即非一合相是名一合相須菩提一合相者即是不可說但凡夫之人貪著其事器界無常碎為微塵則小而多合為世界則大而一若在如來藏中求于生滅大小了不可得故皆曰即非即非乃真空體露也然而真空不空一一皆本如來藏妙真如性故皆曰是名是名即波羅蜜平等衍門也一合相者即是不可說但凡夫之人貪著其事者一合相雖是虗名幻相然而不外法界當下即離名字言說之不思議境故曰即是不可說之實相也然則如來何不說明若如來一加言說但恐凡夫之人不解所說即生貪著于事相上隨語起見故不可說耳三所說諸見平等須菩提若人言佛說我見人見眾生見壽者見須菩提於意云何是人解我所說義不不也世尊是人不解如來所說義何以故世尊說我見人見眾生見壽者見四見雖是眾生迷極心法若至真空體上不留毫妄故皆即非然阿毗依正全處極勝自心地獄色心尚皆究竟況此諸見而非平等實相耶故曰是名我見人見等也須知前後凡言是名處即波羅蜜實相一切法皆摩訶衍也是人解我所說義不者佛謂我已究盡汝已分知固不必說但世間人能解此所說皆實相否空生答斯旨甚深眾生低下談何容易故曰是人不解所說義隨出所以不解之義曰此等四見一一體空即非四見故不解又此四見一一性真即是實相故不解空生至此已深解諸法實相了知諸法皆衍故呈露見解如是透脫圓淨佛則因其圓解而盡情開示會入之故曰發菩提心者應如是知等也二例通一切須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來說即非法相是名法相前來已會聖凡色心等法皆摩訶衍猶恐法門未盡故復因其解悟而開廣之曰發菩提心者皆應如是知見葢謂凡夫小乘心外有法執相起見固不足與語諸法實相矣但此經為大乘者說為發最上乘者說既發十界齊平權實不二之大心則豈但於上如來器界諸見上如是知見哉當於百界千如八萬生滅諸法上一一了知信解皆真空實相并其法相亦皆會入如是方是領知庫藏克家之子不辜如來付財之重能自行化他轉教無疆也以般若正慧蕩汰執疑會八十一科皆摩訶衍部旨至此至矣盡矣故下只須結益以勸流通大章第三流通二一結勸流通二一舉益勸通須菩提若有人以滿無量阿僧秪世界七寶持用布施若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼可知二示流通法云何為人演說不取於相如如不動何以故一切有為法如夢幻泡影如露亦如電應作如是觀正宗經旨既皆會入衍門實相境如如智智如如境則後人流通此經亦當如經正住不動有為不取諸相然後可以所行如所說所說如所行而為人演說矣須知動即有為有為即動取相即不如如如如即不取相下即徵出須不動不取之所以何以故三字是徵辭問何故為人演說者必須不取不動耶答曰良由一切有為之法皆如夢幻不實弘通般若波羅蜜衍門實相之人當如是觀之不當反生取著也二結益流通佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行
