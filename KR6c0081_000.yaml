body:
  text: 金剛般若波羅蜜經部旨科一總題二別文三一序分二一通序如是二別序爾時二正宗二一約發心後住降離相明金剛般若二一讚問希有二答釋三一印許佛言二領旨唯然三正明二一約廣略研釋明住降二一略答住降離相二一答降諸菩二答住復次二廣釋住降離相二一以果法驗明降心離相二一舉身相驗明二一明身相俱非於意二顯聞義俱深二一能聞人勝白佛二所聞義勝何以二舉果法驗明如來二約性福廣釋無住生心三一提相福較福德性二一出相福為較本若人二示性功生佛法若復二歷諸法點無住心二一歷明無住四一佛法所謂二四果須陀三佛得於意四莊嚴菩薩二結示生心二一正示是故二喻顯譬如三結相施重顯性福二一重拈相福為較本如恆二廣顯性功生佛法二一略持人處福勝二一人獲勝福佛告二處如塔廟復次二廣持人處福勝二一人成勝法何況二處如聖賢若是二寄聞持名義顯功德二一持名功德二一問爾時二答三一出名教持二一直示佛告二重釋所以二歷顯無住如來三結示功德若有二聞義功德二一正明二一聞義二一委出經義離相二一空生伸解二一幸己解以歎能聞希有爾時二輕己解以歎當聞希有世尊二如來述成二一印證佛告二深述二一述能聞希有若復二約事理釋成二一約第一理第一二約忍辱事二一由安忍故不驚怖忍辱二引往事釋忍離相如我二結示離相生心二一無住生心是故二無住行施二一正明是故二重釋二一約理釋疑三一標離相如來二示實語如來三明合理如來二約慧顯用若菩二功德三一標示須菩二正明二一生福德二一人成勝福三一較示持説福勝二一出相施為能較本初日二點初隨況出後位若復二釋明經義離相以要三結顯人成佛法二一正明若有二反顯若樂二處如有塔在在二滅罪功二一正明須菩二引較我念三結具於後二總結當知二詳住降前發心無法顯般若波羅蜜三流通二詳住降前發心無法顯般若波羅蜜二一問爾時二答二一示發心平等故稱性本無二一稱性故無所度生須菩二平等故無能發法所以二歷諸法顯無歸平等衍門二一正歷諸法釋無顯平等二一歷二法二一歷果釋顯二一正明二意二一釋實無所得於意二釋所得平等所得二結顯二意二一正結所言二喻顯譬如二歷因釋顯二一離相度生因菩薩二無住莊嚴因若菩二歷三業三一歷意釋顯二一約境智釋顯二一出能照智五眼二融所照境二一約實無所得蕩相須菩二約平等常住釋明所以二以施福貼顯若有二歷身釋顯佛可三歷口釋顯二一無所説法汝勿二無能聞生慧命二復疏所歷釋無顯平等二一疏歷二法二一疏歷果釋顯二一正疏二意二一疏實無所得佛得二疏所得平等二一直示性體復次二稱性修證以無二結顯二意二一約善法結明所言二引施福貼顯若三二疏歷因釋顯二一標起汝勿二釋明二一釋度生二一正釋莫作二反釋若有二釋我當二一正釋如來二轉釋凡夫二疏歷三業三一超疏歷身釋顯二一直顯中實平等可以二雙遮有無二著二一遮著有若以二遮斷無汝若二追疏歷意約施貼顯若菩三疏歷口釋顯二一正約三法三一所説果人平等若人二所説器界平等須菩三所説諸見平等佛説二例通一切發阿三流通二一結勸通流二一舉益勸通若有二示流通法云何二結益流通佛説金剛般若部旨科終
