body:
  text: 天台比丘靈耀撰一總題金剛般若波羅蜜經般若即凡聖共有之心而凡小迷之不顯者由四相六塵之所染汙而不得起乎金剛大用故也今貫之以金剛則真空慧觀當前不但破六凡四住抑且蕩二乘疑執矣凡前半卷明住降離相一切俱非處皆是也波羅蜜即衍門實相元無彼此到否秪是對凡夫全迷二乘執著俱未開祕藏未見寶渚者名為到彼耳凡後半卷明發心平等一切俱是者是也良由總者總于別別者別于總總別雖二所詮只一故不可離去總題別開解釋況此經部旨惟在蕩疑會法不但別文顯著即此總題大義了然金剛般若大空蕩相也平等彼岸會一切皆摩訶衍也總別顯映驪珠宛抱若曰即三般若亦祕密藏名分通別義開五重如常所明茲不臚列二別文三一序分二一通序如是我聞一時佛在舍衛國祗樹給孤獨園與大比丘衆千二百五十人俱二別序爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐要顯如來全體大用究竟深智乃假世間日用尋常衣食淺事而為發起正如法華開為合序觀經苦為樂序之意不可勉作寂滅忍第一空等表法而釋亦不用戒為定慧之基而說蓋一作法律奇特之談即失尋常事用為序之意矣二正宗大分二一約發心後住降離相以明金剛般若二詳住降前發心無法以顯般若波羅蜜夫般若部旨在以空慧水遍蕩執情會八十一科皆摩訶衍前半卷明住降修入工夫重在蕩執消塵故多明一切即非以顯金剛大用而從便會入真空實相故雖有是名等說然而破正會傍大判屬於明金剛般若後半卷空生既解住降離相名義翛然却顧本因則最初尚有一發心之法在無明未去則源頭未清祕藏難開地住難入雖有修功恐仍有相未免住不得善住降不得善降而因果修證均不究竟平等矣故有重問而如來直示之曰真如界內絶生佛之假名平等慧中無自他之形相若有一發心之法可得即于平等體上有增有減矣須知實相般若湛然常住纖塵不立曾無有無之名相可得苟一言有即有對有之無成對待增減之法非平等性體也故言實無有法發阿耨菩提心此實無有法不但無有抑且無無有無雙遣平等斯彰既于初因了知性自齊平則從因至果皆無得無修無莊嚴無度生一切俱無俱會平等故雖熾然因果修證莫不全性起修修全在性性修一契入究竟摩訶衍彼岸矣凡文中諸法如義無實無虗皆是佛法是法平等如如不動及一切是名處皆點衍門彼岸從淺至深先破後會法應爾也或曰前半卷亦有無實無虗一切是名等說後半卷亦有一切俱非之言何得前半卷只屬金剛般若之蕩相而後半卷只屬般若波羅蜜之會法耶答此有二意一前後部旨各有傍正二彰體用圓融不同歷別蓋前半卷空生乍見離相般若而自己相心未絶未可即會聖凡諸法以歸平等實相宜以真空慧觀遍蕩執情故明破明非之言多而間露是名之說及至最後結義中佛方少少點出無實無虗之旨者正一代教主意在圓也儻空生于此即會實相下半卷皆不必矣其如當機只在六根淨位只領一切俱破以蕩執情未了一切俱是盡入衍門此則前半卷但屬真空蕩相明矣由是重起入住有法之問佛知機宜漸已通泰堪以諸法實相之旨加于可加矣故言雖帶于即非實無之說而義實彰夫實相平等之旨從此而愈入愈深隨會因果三業世出世間八十一科八萬生滅等法俱入實相摩訶衍而波羅蜜之義全顯矣是則兩章言稍相帶而義實條分各有傍正不可混亂也又復前有俱是雙遮之言後存俱非夢幻之說所以彰體用圓融不關歷別者蓋前雖破執明慧觀之用而意不離實相之體故有是名無實無虗之說後雖會法顯彼岸之體而意不外用故亦有俱非實無之言正破顯相須而不相離體用各重而互相即之圓旨也今初分二一讚問時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心應云何住云何降伏其心空生忽讚希有者因如來日用尋常不異庸人不露絲毫圭角而其內證慈智迥超九界是以希有蓋行與人同而心與人異如樵者在山隱者亦在山在山則同所以在山則異也若在如來出世至今靡不皆爾然在空生向來不知而今日乍見不覺忍俊不禁三業踴躍驟然而讚曰希有只此一讚自不同於如聾若啞為除糞穢默受彈訶脫衣悲泣時矣隨即釋出希有所以曰如來善護念諸菩薩善付囑諸菩薩當知世尊自華嚴至今時時護付無不護付時但可曰護付不可曰善護善付蓋已涉言詮故加駭動偏而非圓故也今則與同衣食略不現奇而悲心內護實為最親切者故名為善如第五倫之于侄病夜十起問視而歸則安臥其於子病雖不起問視而終夜不寐是也又復應知希有不即是護付而不外乎護付護付非即希有而初不離希有如世間聖人之一貫不即忠恕而不外乎忠恕忠恕非即一貫而初不離一貫要之在聖人自是混全第可曰一曰希有而在賢者未免分疏即視為忠恕護付矣善男子女人發阿耨菩提心應云何住降者空生未見已前得少為足不願好者今既窺見一斑陡發大心欣慕上乘故曰我等已發希有之心矣但發心之後直欲造修至如來護付地位恐難頓入必從住降工夫漸次而入我知如來當日亦由住降發軔方至今日善護善付僧既求佛宜從佛行故問發心之後應云何住云何降伏耶二答釋三一印許佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心當知善護善付是如來之行到而空生之見到二心不別故佛垂印許二領旨唯然世尊願樂欲聞三正明分二一約廣略研釋明住降二寄聞持名義顯功德初又二一略答住降離相二廣釋住降離相說於般若有廣略二門雙被利鈍是也一略答二一答降佛告須菩提諸菩薩摩訶薩應如是降伏其心所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想若非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩二答住復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住佛之所以印證空生者因其所見不謬也至於求至護付工夫曰云何住降則又局在小乘見解矣意謂我空生已能安住偏真矣今又應如何棄去萬緣得安住實相耶我已視四生如桎梏而降伏四住矣今又應如何降伏無明耶佛知一切小乘保證已來未堪加大第與彈訶而已今空生既見希有頓發大心堪以大空開拓小空大智擴充小智故直反其所問而進之曰汝向視四生如桎梏欲離生降心乃小乘境界也今既發大心當改途易轍廣度衆生萬是降心而度生處必須離相此竟將圓乘大任一肩付與空生使其轉教正加者加于可加時也即汝向來沉空住寂執守偏真亦小乘境界也今既求作佛亦不可守定故武當廣行六度方是安住然行六度時又不可著諸法相須從無住本立一切法則行行皆全性起修與虗空等此又將大乘妙行而勉進空生正付與財物一任出內取與也乃如來時時欲誘小乘向大始于今日得其機宜故一并付豫此兩答的是般若會上付財令其轉教也至于以身相果法重重勘驗而引進之是使諸法融通汰盡餘疑皆入衍門矣此廣略等釋中皆先降後住者在空生向來沉空住寂故問亦急於住理而後於降心在如來因其發心向大貴乎先歷事行而住理自在其中故亦反其所問而先降後住非降心文略安住文廣之謂也二廣釋住降離相二一以果法驗明降心離相二一舉身相驗明二一明身相俱非須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所說身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來已上空生發問如來委答理雖明了未知當機領與不領故換一問頭如探竿影草以驗試之曰因中度生離相果上成佛身相為復是有是無儻猶著身相是有則渠行因離相之旨未全透脫今空生如俊鷹快見鞭影即歸正路故直答之曰發心究竟二不別因既離相果何身法哉要知空生此時已用金剛慧抉四眼之膜故盡情呈露無相之解此中有三層領解不也一層不可以身相見二層如來所說身相即非身相三層也此解若邪佛當訶斥此解若正佛當讚許佛則二俱不用而開深其解曰汝將謂佛身離四絶百清淨無為為非相乎須知染淨聖凡一切皆非也又汝向來但知六凡世相皆為虗妄而棄去之豈知即二乘菩薩佛相亦皆虗妄不實耶蓋因其分見而開令圓滿引其小空而歸于大空在佛成道已來即循循善誘欲開小空小智無奈機宜未可且爾默默今得可開之機稱佛本懷故即引而申之曰凡所有相皆是虗妄若見諸相非相即見如來正加于可加時矣一切虗妄諸相非相金剛般若也即見如來般若波羅蜜也須知此等顯實之言據佛意在圓故處處點出而機情未熟只領真空破蕩之功不可於此執文害意二顯聞義俱深二一能聞人勝須菩提白佛言世尊頗有衆生得聞如是言說章句生實信不佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德空生意謂此真空妙說我積劫至今方一聞見降我已後恐聞信無人斯道或絶佛謂金剛般若人人本具在汝乍見以為奇特在佛圓照代不乏人豈惟佛世多機即如來滅後後五百歲鬬諍堅固之時猶有火裏青蓮聞此般若能生實信但其夙植深厚為佛見知非聊爾人也一念淨信即是金剛得用掃盡千念萬念情塵而獨露般若靈知之一念正萬法歸一識得一則萬事畢也此初心一念般若與佛證窮甚深般若孱齊故為佛悉知悉見二所聞義深何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相何以故是諸衆生若心取相即為著我人衆生壽者若取法相即著我人衆生壽者何以故著取非法相則著我人衆生壽者是故不應取法不應取非法以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法既顯此一念則如迷方既悟不復更迷精金一出更不雜礦諸相懸離圓明莫染故曰無復我相人相衆生相壽者相無復者不更不再之謂豈但無凡夫四相且無聖證法相及觀智能空之非法相觀智不忘如大經之闍樓衣未脫故曰若一著非法即為生死四相所以法非法相均不可著次即引事而釋成之曰我所說法如對此岸人說渡河之筏一般此筏即法非法相也對著有者說空為筏對著空人說實相為筏因病發藥病去藥除初無定在既渡岸已二俱應捨出阿含經筏喻品二舉果法驗明須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說何以故如來所說法皆不可取不可說非法非非法所以者何一切賢聖皆以無為法而有差別佛既示般若體露則四相法相非法相俱離不但度生之當離而已恐空生未領故復舉如來度盡衆生乃證菩提修行既滿為生說法以試驗之曰如來得菩提耶有說法耶此有二意一欲開深空生大智二即會一切法摩訶衍也空生至此心已融通故開口答辭便融通含畜不如前之率爾其曰若論如來歷劫修行自然得果出世已來在在說法但我解佛比來所說筏喻無定之義則無定法名菩提不過對凡夫低下而假名無上對衆生邪雜而假曰正等對迷人在夢假名正覺其實般若體上無生可得又何得有對生說佛之阿耨多羅三藐三菩提名尚無定何有實得哉即所說之法如對病發藥衆生病尚叵得又何對空說有等之定法法既無定何可說耶猶恐無定之旨未明故復釋之曰若有所說即墮四相矣是以皆不可取不可說此領上無四相也非法即領上無法相也非非法即領上亦無非法相也此一番已謹對領上所示旨趣而猶恐俱非之義未顯故復釋之曰若論修行證智雖有淺深大小賢聖之分其實所顯離相般若一切皆同也勿謂我小智小空不同如來大空般若也蓋若有四相非無為法若存法相即非無為若有非法相即非無為矣略中但云離四相今點無為般若上併無法相非法相豈非廣前降心離相二約性福廣釋無住生心三一提相施較福德性二一出相福為較本須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多由前略答布施無住而猶未明如何布施如何無住福深故重提前相福之多以為較量無住性功之本非福德性即著相布施布施兩提大千七寶無住不住十界聖凡福勝委出人處功德豈非廣前無住行施二示性功生佛法若復有人於此經中受持乃至四句偈等為他人說其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出於此經持說即安住無住般若而自行化他今云出諸佛菩提即略答中虗空不可思量之福也至下重較量中并其人處廣略委出福相二歷諸法點無住心二一歷明無住四一佛法須菩提所謂佛法者即非佛法所謂二字即牒前所出諸佛菩提即非二字即金剛般若二四果須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹須菩提於意云何斯陀含能作是念我得斯陀洹果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行更歷四果者四空生已修已證之法而提問之令渠自招無住在空生一一言無者正一切聖賢皆無為法之明證也三佛得佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得佛於然燈佛所於法無得是舉釋迦修證而勘問之與前通說佛法不同四莊嚴須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴此舉菩薩六度萬行以顯無住從不住六塵四果菩薩佛法以顯無住者是佛復於無住行施章內以圓空實智開空生小空小慧會一切法皆摩訶衍處也此旨不但于此正說兩章中疊明即下持名聞義內亦莫不會一切皆歸無住云二結示生心二一正示是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心是故二字乃結定之辭良由無住性德當前佛法四果如來莊嚴俱不可著是故汝最初問應云何住我即答汝曰諸菩薩應如是不住生心不應住六塵萬法而生六度萬行之心此說乃直提初問初答之語而結顯之也不應住色生心即上不應住色生布施心乃至不應住色生萬行心若一有所住即生死四相之染汙心一無所住而生萬行之心乃金剛般若現前一一悉皆稱性起修是以雖終日生心而其心終日清淨也又復不應住者乃金剛寶劍直掃十界情塵也若二乘人執之以為究竟即沉空住寂孤調泥洹矣故更䇿進曰應無所住而生其心其有所指也蓋謂六度萬行迎賓送客著衣喫飯等心耳良以著衣喫飯六度萬行一一皆依無住般若而起妙行故行行無非般若所謂入理般若名為住以無住法住般若波羅蜜中也即釋迦牟尼佛最初與同人法持鉢乞食亦深安此理所以空生一見即便驚嘆希有又復無住生心不但所生善心為般若即一切惡無記業報等心靡不皆然淨名云從無住本立一切法一切法者理則性德緣了事則修德三因迷則三道流轉悟則果中勝用如是四重皆依迷中實相而立若不即性則無厭足王勝熱婆羅門調達和須密女皆實惡法矣所以從無住而生雖惡亦性苟有著而起雖善亦邪也二喻顯須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛說非身是名大身即舉非身大身而譬明之曰若住于有雖山王亦小若了非身雖毫末亦大也若欲委簡法相當依幽溪大師不住而生生而不住諸句及六即明無住等釋三結相施重顯性福二一重拈相福為較本須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊前但云大千寶施今復云恆沙大千寶施者秪是舉相施之多益顯無住受持功勝耳非有優劣之分也縱使能較相施容有多少若夫所較性功斷無軒輊秪如今略持中人獲勝福處如塔廟況出廣持則人成勝法處如聖賢以對前略答中出無住福勝則曰虗空不可思量次廣釋初無住福勝則曰出生諸佛菩提足以見說法融通照映之妙何可分淺深優劣之殊哉二廣顯性功成佛法二一略持人處福勝二顯性福而必約廣略持說者正說于般若有廣略二門說既有二持者亦然又廣略中必有自持教他即般若付財令其轉教意也法華云其中多少所應取與略為少廣為多自行為取教他為與受持讀誦是佛付財為他人說是佛令轉教例之前後靡不咸爾一人獲勝福佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德二處如塔廟復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟二廣持人處福勝二一人成勝法何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法最上第一希有即金剛般若波羅蜜之褒名也故至下問名中佛直以金剛般若之全名答之二處如聖賢若是經典所在之處即為有佛若尊重弟子究竟者為佛分證者為弟子即為若三字是如聖賢而非即聖賢也不必依魏譯倒讀釋之二寄聞持名義顯功德二一持名功德二一問爾時須菩提白佛言世尊當何名此經我等云何奉持上來約廣略詳明住降離相之旨已盡理當問名以便流通當何名此經者在空生聞此經義意超脫功用難思似乎不可得而名名之意況受持此說即能成就最上第一希有之法則又不可標偏名以該圓德矣故曰當何名之二答三一出名教持二一直示佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持佛謂名者所以召實此經既有最上第一希有等三德之實固當即以金剛般若波羅蜜等三德之全名而名之不可偏字矣二重釋所以者何須菩提佛說般若波羅蜜即非般若波羅蜜是名般若波羅蜜所以者何下即出命名之義曰凡六百卷經皆曰般若波羅蜜而今特加金剛二字者何也次即釋出加金剛二字之所以曰良由此金剛慧劍當前不但掃淨六凡四相之著即般若之法亦不許著所謂般若大火聚四邊不可取取之則燒若於般若取著亦以金剛大用而斬斷之故曰般若波羅蜜即非般若波羅蜜然後得顯無相之般若波羅蜜也即非二字乃金剛大用此一答已盡加金剛二字之旨趣矣二歷顯無住須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來說三十二相即是非相是名三十二相如來因便用上無住妙慧遍蕩聖凡一切相著以顯金剛勝用曰即非世界身相說法也此於持名中融通一切而歸摩訶衍之部旨也三結示功德須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多今但持名而已何必功德亦勝身命布施耶彥云聲價千金名之所存即實之所存如至尊一名群臣莫及也二聞義功德二一正明二一聞義二一委出經義離相二一空生伸解二一幸已解以明能聞希有爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨即生實相當知是人成就第一希有功德世尊是實相者即是非相是故如來說名實相此章先明經義次明功德直至經義不可思議果報亦不可思議是雙結今且師資合歎所聞經義希有聞說是經乃言語也深解義趣者言下所詮之義即金剛般若大用現前掃盡十界情著以歸真空離相乃前處處所明即非是也趣是言外所顯之意真空不空一一皆歸實相彼岸會一切皆摩訶衍乃前處處所明是名者是也故直歎之曰希有希有與前不同前是初窺如來尋常日用莫非無住般若現前如天王華屋一時乍見曰希有今則宛轉問答委曲詳明深知真空不空法法皆實如已覩彌勒樓閣重重細見五步一樓十步一閣而不暇遍言宮裏事矣是則前窺廣大今悉精微故曰希有然而今復悲淚者良由從得慧眼以來未曾得聞如是之經儻一錯過所失彌多故復悲淚次歎他聞希有中得聞是經乃聞慧信解是思慧受持乃修慧三慧既足亦當如我今日深解義趣矣信心清淨即上義也用金剛大用掃空一切而真空體露不著十界情塵為清淨衆生心水淨諸佛影現中真空不空即顯實相如春池喻內水清珠現鏡淨明生諸法不生而般若生為即生實相當知實相無能生所生不過開顯如來藏體假名曰生所謂千年常住一朝生耳此是前所解之趣也既空萬有此人豈非第一般若耶既生實相此人豈非已到寶所彼岸之希有人耶二輕已解以歎當聞希有世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人即為第一希有何以故此人無我相無人相無衆生相無壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相即名諸佛意謂我等已去見思開入大乘即六根淨位之人況承佛諄諄善誘令我得開性藏以窺究竟不足為難但後五百歲剛強難化之時聖賢月沒人根淺鈍其有衆生得聞是經但能入思修兩慧相似見性當知是相似即佛即為第一希有次即釋明第一希有之故何以故三字是徵問之詞言前邊信心清淨即生實相已分證祕藏可曰第一今但信解受持不過五品六根在修之人而已何得亦曰第一耶下釋之曰當知此人既能信解受持已是思修二慧之人時時以金剛大用現前永離四相獨露真空者矣故六根淨位實道能通可為第一何以故離一切諸相即名諸佛乃釋明希有二字此中何以故三字又是徵詞曰六根淨位可與前信心清淨相同而名第一矣其如此人但在修慧未得分證實相何得名曰希有耶故即釋之曰但恐人心不空耳既能空諸所有即是真空不空不空即實相所謂鏡淨明生淨極光通不真何待故此人即名到實相彼岸之相似諸佛為希有也又復應知離一切諸相處即前深解之義即名諸佛處即前深領之趣皆詳明住降離相中宗旨今空生于所聞義內結要出之非離前文別說他法也空生既自解此法即以此法歎擬後人在文宛爾學者知之二如來述成二一印證佛告須菩提如是如是雙言如是者以空生歎聞經之人雖有證修差別至于均得第一希有功德殊非謬濫故雙印之二深述二一述能聞希有若復有人得聞是經不驚不怖不畏當知是人甚為希有此即反其領歎之詞而述成之曰須菩提爾何求全于人如是之深也必欲其信心清淨即生實相及信解受持而後許其為第一希有耶須知有人得聞如來所說以金剛慧遍掃十界情著即顯實相希有之旨能安忍領解而不驚怖即是五品初心能一念隨順之人矣故卒聞一切俱空佛法亦空而不驚向來倚第一般若為導六度萬行之主今亦非去而不怖向倚般若為歸趣之處今亦空去而不畏蓋已了知吾人心體一真未迷之前無般若之名相究竟極果之後又何般若之主導哉故聞此真空蕩相之旨而能安忍不驚怖也當知此人已能圓伏五住觀行如佛如法華經隨喜品中歎其功德難思與佛比次故云甚為希有言一甚字即發心究竟二不別如是二心前心難也如來既深許五品初心但不驚怖即為希有於理難信故雙約事理以釋明之二約事理釋成二一約第一理何以故須菩提如來說第一波羅蜜即非第一波羅蜜是名第一波羅蜜何以故三字是徵詞此人云何不驚怖即希有耶釋曰般若乃萬行六度之主今金剛大用當前并第一般若之相不許著若著般若亦同四相故掃除之曰即非第一波羅蜜凡夫小乘聞如此說未有不驚疑怖畏者今圓人已深合真空實相隨順歡喜故不驚怖真空之下即實相常住復能安住不動是觀行如佛與佛同心故許之曰甚為希有也二約忍辱事二一由安忍故不驚怖須菩提忍辱波羅蜜如來說非忍辱波羅蜜是名忍辱波羅蜜聞深理而不驚良由已得伏順二忍忍成于己故寵辱不驚逆順俱安天龍恭敬不以為喜惡王割截無有瞋恨十乘止觀中能安忍則不退轉皆是也今聞境智俱空在不忍者必多驚疑怖畏此人已能圓伏忍成故不驚怖法華云菩薩住忍辱地柔和善順而不卒暴心亦不驚是已此一句乃釋忍成不驚者甚為希有義也蓋忍辱之人一有我為能忍彼為能辱之念即墮四相不得為究竟彼岸之希有忍矣今此人深安辱境而人我俱忘四相俱掃故曰即非既即非之後一一成究竟實忍豈非希有耶二引往事釋忍離相何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相何以故又是徵起之詞難曰人能安忍至理故不驚怖今如來復曰即非忍辱則并能忍亦空有何證成而知行忍者無人我相耶即舉如來已修已驗之事而證成行忍並無四相蓋平時可以虗假至于生死大難跟前不可絲毫勉強故曰我於爾時無有四相也何以故者又問般若可無四相至于忍辱因有我能忍彼為所忍故成此行是則即有四相何咎答若有我相人相即生死非相矣何以故三字又是徵訶何以證知如來行忍之時了無四相耶即釋明曰我方節節支解時若少有我相等四即生瞋恨矣良由人我俱忘故瞋恨不生支節完復耳以由行忍離相故逆順俱安惡境不生瞋恨好境不生喜著聞深不生驚怖耳又復四相遠離故曰即非忍辱乃般若真空現前也法法皆是故曰是名忍辱乃真空不空到實相彼岸也故許此初隨不驚之人即為希有此章許多何以故乃經中血脈聯絡處字字俱要著落經旨方現二結示離相生心二前廣釋中初歷顯無住已然後結無住以示生心今出經義內先委明離相已然後結離相以示生心而生心處仍曰無住者須知離相即無住無住即離相可得互舉而復互顯之也一無住生心是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住即為非住是故二字乃結攝之詞良由無住之旨雖般若深理猶不可著即忍辱相待之行亦離四相是故我先答汝曰無住菩薩即發心亦應離一切相及不應住色等生心布施也二無住行施二一正明是故佛說菩薩心不應住色布施此乃結前廣略住降中無住之旨以點明經義也但前無離相發心之語今佛直欲顯無住之旨究竟故并其住降前發心無相而和盤托出其如空生雖聞此語未深領解故有下邊菩薩既有發心則云何應住云何降伏之問若於此了知最初發心無法之旨下半卷問答均可已矣生心所該甚廣六度萬行善惡等心皆是也而今別提出無住布施之一端者以由如來最初略答時即有應無所住行于布施之語故今結出況布施為六度之首若此度詳明無住之旨餘者皆可比知矣二釋疑一約理釋疑三一標離相須菩提菩薩為利益一切衆生故應如是布施如來說一切諸相即是非相又說一切衆生即非衆生菩薩行施時人我未忘與衆生結怨愛之緣互為子孫父母冤家債主纏結無已焉得離脫輪回生死耶若菩薩雖熾行六度而四相俱空則一一咸歸無相般若成究竟彼岸之行乃大利益一切衆生不可謂不住行施無益于六道也所以如來教人行施決不可住相者良由一切諸相即是非相即所施一切衆生即非衆生如翳眼空華妄有能所起滅耳若在如來以金剛慧眼觀晴明空于中欲求能施所施了不可得故曰非相非生二示實語須菩提如來是真語者實語者如語者不誑語者不異語者前云菩薩為利益一切衆生又云一切衆生即非衆生母乃空有矛盾二三其說乎釋曰如來是真語實語決不詿誤后人況佛所說法必契理契機佛證三諦說必依之真語如語乃稱真諦即空而說也實語稱中道實相而說也是為遮則法爾空中若佛依俗諦門頭教化一切亦無不當于二理故曰不誑不異三明合理如來所得法此法無實無虗良由此法無實故如來說一切衆生即非衆生良由此法無虗故如來說利益一切衆生是則如來所說莫非稱理皆真語實語非誑惑于人也二約慧顯用須菩提若菩薩心住於法而行布施如人入暗即無所見若菩薩心不住法而行布施如人有目日光明照見種種色我之所以教諸菩薩不住生心者以由菩薩之心苟住於法而生不惟惡心不好即布施之心亦如人之入暗長夜漫漫永無所見若得金剛無住之大用而離相行施則諸相俱空般若炳現滿目河山莫非實相如人有目日光明照見種種色矣須知入暗之人如大富盲兒本有家珍反為困苦雖般若本智彼岸實境一著世相均為無明日日奔取隨業受報自心取自心非幻成幻法故一無所見若不住法如人有目等者日即本有大光明藏之般若種種色即諸法實相之彼岸以得金剛大用掃淨相著故得如智如境一一照明又復應知即今日目色三一一顯了並無所增當其住暗亦無所減只在當人迷悟背向之間差之毫釐失之千里于三德中枉受輪回如演若迷頭得失無改而自生欣戚為可憐愍試觀佛於最初對答且爾汲引凡心遠離相著重在金剛蕩相之用今則機宜稍深堪開全德方示無實無虗之中道遍開三德三因之全體在暗不增處明不減金剛般若波羅蜜之祕藏和盤托出更無剩法即可結益以勸流通矣二功德三一標示須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德上邊結攝經義既即廣略中義則今結顯功德亦不離前但在前散漫多端今則結成兩章義彌顯了又此功德即廣前十方虗空不可思量及廣略持說人處福勝之義也二正明二一生善德二一人成勝福三一較示持說福勝二此章大意結出般若部旨以顯教相利益也夫般若帶通別二正說圓教故曰為大乘者說為發最上乘者說人能荷擔無上正覺及滅罪中當得菩提等益皆由一代教主意唯圓不詮凡小故也是以因反釋而復揀去三藏小乘一出相施為能較本須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施二點初隨況出後位若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說信心不逆即重指如來述成中不驚不怖之人以況出受持演說五品深信之功德二釋明經義離相須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者說為發最上乘者說大乘即經中離相無住處處明即非二字皆通無生門及別教初空觀也最上乘即經中無實無虗日光明照處處是名二字乃純圓法也問如來往往教人植福感報因必有果皆可詮量纖毫不爽何故今日持說之福佛叵思量答阿含等經因果分明可思可說者但為小乘人天說耳今之般若乃為大乘通別兩種人說正為最上純圓人說故不可思量若必欲出其五品功德當知是人即為荷擔菩提之觀行相似佛矣蓋五品六根已相似得百界分身化度衆生之任故曰即為荷擔菩提也三結顯人成佛法二一正明若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等即為荷擔如來阿耨多羅三藐三菩提二反顯何以故須菩提若樂小法者著我見人見衆生見壽者見即於此經不能聽受讀誦為人解說二處如有塔須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍繞以諸華香而散其處二滅罪功二一正明復次須菩提若善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提金剛利用當前不但能破四相六塵之惑障又能破二種生死之業障報障也二引較須菩提我念過去無量阿僧祗劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及二結具須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心即狂亂狐疑不信二總結須菩提當知是經義不可思議果報亦不可思議
